<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <title>MemoKard Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Noto Sans Thai", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at top left, rgba(168, 85, 247, 0.2), transparent 32rem),
          linear-gradient(135deg, #f8fafc, #faf5ff 48%, #fdf2f8);
        color: #1e293b;
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        display: grid;
        place-items: center;
        border-radius: 24px;
        background: linear-gradient(135deg, #8b5cf6, #ec4899);
        color: white;
        box-shadow: 0 18px 40px rgba(124, 58, 237, 0.28);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.6rem, 7vw, 2.3rem);
        line-height: 1.15;
      }

      p {
        margin: 0 0 24px;
        color: #64748b;
        line-height: 1.7;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 13px 20px;
        background: linear-gradient(135deg, #8b5cf6, #ec4899);
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 14px 30px rgba(124, 58, 237, 0.22);
      }

      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(circle at top left, rgba(168, 85, 247, 0.18), transparent 30rem),
            #020617;
          color: #e2e8f0;
        }

        p {
          color: #94a3b8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <svg width="34" height="34" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2m14 0V9a2 2 0 0 0-2-2M5 11V9a2 2 0 0 1 2-2m0 0V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2M7 7h10" />
        </svg>
      </div>
      <h1>ใช้งานต่อแบบออฟไลน์ได้</h1>
      <p>ข้อมูลที่เคยเปิดไว้จะยังเข้าได้ และการเปลี่ยนแปลงจะรอซิงก์เมื่ออินเทอร์เน็ตกลับมา</p>
      <button type="button" onclick="window.location.reload()">ลองเชื่อมต่ออีกครั้ง</button>
    </main>
  </body>
</html>
